name: Build and Deploy to Hostinger

# Runs on every push to the main branch, and can be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          # These come from GitHub repo Secrets (Settings > Secrets and variables > Actions).
          # They are injected at build time and never stored in the repo.
          VITE_WC_URL: ${{ secrets.VITE_WC_URL }}
          VITE_WC_AUTH: ${{ secrets.VITE_WC_AUTH }}
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Upload the built site only.
          local-dir: ./dist/
          # Hostinger primary-domain web root. If you deploy to an addon domain
          # or subdomain, change this (e.g. /domains/gearplug.ug/public_html/).
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Keep the deploy clean but don't wipe unrelated files.
          dangerous-clean-slate: false
